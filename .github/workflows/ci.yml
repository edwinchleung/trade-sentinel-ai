name: CI

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]

jobs:
  api:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: apps/api
    steps:
      - uses: actions/checkout@v4
      - uses: astral-sh/setup-uv@v5
      - run: uv sync --dev
      - run: uv run ruff check .
      - run: uv run pytest -q -m "not live"

  api-postgres:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: apps/api
    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: tradesentinel
          POSTGRES_PASSWORD: tradesentinel
          POSTGRES_DB: tradesentinel
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U tradesentinel -d tradesentinel"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 5
    steps:
      - uses: actions/checkout@v4
      - uses: astral-sh/setup-uv@v5
      - name: Init Postgres schema
        run: |
          sudo apt-get update -qq
          sudo apt-get install -qq postgresql-client
          PGPASSWORD=tradesentinel psql -h localhost -U tradesentinel -d tradesentinel \
            -f ../../docker/postgres/init.sql
      - run: uv sync --dev
      - run: uv run pytest -q -m "not live" tests/test_db_journal.py tests/test_db_cache.py tests/test_watchlists.py
        env:
          DATABASE_URL: postgresql://tradesentinel:tradesentinel@localhost:5432/tradesentinel

  web:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: apps/web/package-lock.json
      - run: npm ci
        working-directory: apps/web
      - run: npm run lint
        working-directory: apps/web
      - run: npm run build
        working-directory: apps/web
